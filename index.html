<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky Drones</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background:#0f172a; color:#f8fafc; line-height:1.5; }
  a { color: inherit; text-decoration: none; }

  header { background:#1e293b; padding:1rem 2rem; text-align:center; }
  header img { height:60px; margin-bottom:0.5rem; }
  header h1 { font-size:2rem; margin-bottom:0.25rem; }

  .banner { text-align:center; margin:2rem auto; }
  .banner img { width:100%; max-width:900px; border-radius:0.5rem; }

  h2 { font-size:1.8rem; margin-bottom:1rem; text-align:center; }

  #drones { padding:2rem; display:flex; flex-wrap:wrap; justify-content:center; gap:1rem; }
  .drone-card { background:#1e293b; border-radius:0.5rem; width:220px; padding:1rem; text-align:center; transition:transform 0.2s; }
  .drone-card img { width:100%; border-radius:0.25rem; margin-bottom:0.5rem; }
  .drone-card:hover { transform:translateY(-5px); }

  #track { padding:2rem; text-align:center; }
  #track input[type="text"] { padding:0.5rem; margin-right:0.5rem; border-radius:0.25rem; border:none; width:200px; max-width:80%; }
  #track button { padding:0.5rem 1rem; background:#38bdf8; border:none; color:#0f172a; border-radius:0.25rem; cursor:pointer; transition:background 0.2s; }
  #track button:hover { background:#0ea5e9; }
  #track-results { display:flex; flex-wrap:wrap; justify-content:center; gap:1rem; margin-top:2rem; }
  .track-card { background:#1e293b; padding:1rem; border-radius:0.5rem; width:150px; text-align:center; }
  .track-card img { width:100%; border-radius:0.25rem; margin-bottom:0.5rem; }

  footer { background:#1e293b; text-align:center; padding:1rem 0; margin-top:2rem; }

  @media (max-width:600px){
    header h1 { font-size:1.5rem; }
    #drones, #track-results { flex-direction:column; align-items:center; }
    .drone-card, .track-card { width:80%; }
    #track input[type="text"] { width:70%; margin-bottom:0.5rem; }
  }
</style>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabase = supabase.createClient(
    "YOUR_SUPABASE_URL",
    "YOUR_SUPABASE_ANON_KEY"
  );
</script>
</head>

<body>

<!-- Header -->
<header>
  <img src="images/logo.png" alt="NorthSky Drones Logo">
  <h1>NorthSky Drones</h1>
</header>

<!-- Banner -->
<section class="banner">
  <img src="images/banner.jpg" alt="Drone Banner">
</section>

<!-- Drones Section -->
<section id="drones">
  <h2>Our Drones</h2>
  <div class="drone-card">
    <img src="images/drone1.jpg" alt="SkyMaster X1">
    <p>SkyMaster X1</p>
  </div>
  <div class="drone-card">
    <img src="images/drone2.jpg" alt="AeroFlyer 3000">
    <p>AeroFlyer 3000</p>
  </div>
  <div class="drone-card">
    <img src="images/drone3.jpg" alt="CloudRider Pro">
    <p>CloudRider Pro</p>
  </div>
</section>

<!-- Track Section -->
<section id="track">
  <h2>Track Your Drone</h2>
  <input type="text" id="tracking-id" placeholder="Enter Tracking ID">
  <button onclick="trackDrone()">Track</button>

  <div id="track-results"></div>
</section>

<!-- Footer -->
<footer>
  &copy; 2026 NorthSky Drones. All rights reserved.
</footer>

<script>
async function trackDrone() {
  const trackingId = document.getElementById('tracking-id').value.trim();
  const resultsContainer = document.getElementById('track-results');
  resultsContainer.innerHTML = '';

  if (!trackingId) {
    alert('Please enter a tracking ID');
    return;
  }

  // Supabase query
  const { data, error } = await supabase
    .from('drone_tracking')
    .select('*')
    .eq('tracking_id', trackingId);

  if (error) {
    console.error(error);
    alert('Error fetching tracking info');
    return;
  }

  if (!data || data.length === 0) {
    resultsContainer.innerHTML = '<p>No drone found with that tracking ID.</p>';
    return;
  }

  data.forEach(drone => {
    const card = document.createElement('div');
    card.className = 'track-card';
    const imageName = drone.drone_name.replace(/\s+/g,'').toLowerCase();
    card.innerHTML = `
      <img src="images/${imageName}.jpg" alt="${drone.drone_name}">
      <p>${drone.drone_name}</p>
      <p>Status: ${drone.status}</p>
      <p>Last Updated: ${new Date(drone.last_updated).toLocaleString()}</p>
    `;
    resultsContainer.appendChild(card);
  });
}
</script>

</body>
</html>
